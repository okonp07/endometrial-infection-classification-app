name: Sync Hugging Face Space

on:
  push:
    branches:
      - main

jobs:
  sync:
    if: ${{ secrets.HF_TOKEN != '' && secrets.HF_SPACE_REPO != '' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          git clone https://__token__:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_REPO} hf-space

      - name: Sync repository contents
        run: |
          rsync -av --delete \
            --exclude ".git/" \
            --exclude ".github/" \
            --exclude ".venv/" \
            --exclude "__pycache__/" \
            ./ hf-space/

      - name: Commit and push
        env:
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          cd hf-space
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to push."
            exit 0
          fi
          git commit -m "Sync from GitHub ${GITHUB_SHA}"
          git push origin main
